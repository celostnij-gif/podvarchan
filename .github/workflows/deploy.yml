name: Deploy to Cloudflare Workers

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy-site:
    name: Site (podvarchan.com)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci


      - name: ESLint check
        run: npm run lint

      - name: Build site
        run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAADYZ2z3RysEsBoQu
          NEXTJS_ENV: production
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DATABASE_ID: ${{ secrets.CLOUDFLARE_DATABASE_ID }}

      - name: IndexNow ping
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "podvarchan.com",
              "key": "8a43183f603f4adb9fd469d2fc5d7cef",
              "keyLocation": "https://podvarchan.com/8a43183f603f4adb9fd469d2fc5d7cef.txt",
              "urlList": ["https://podvarchan.com/sitemap.xml"]
            }'

  deploy-admin:
    name: Admin (admin.podvarchan.com)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd apps/admin && npm install --no-audit --no-fund


      - name: Build admin
        run: cd apps/admin && npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          ADMIN_SEED_EMAIL: ${{ secrets.ADMIN_SEED_EMAIL }}
          ADMIN_SEED_PASSWORD: ${{ secrets.ADMIN_SEED_PASSWORD }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAADYZ2z3RysEsBoQu
          NEXTJS_ENV: production
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_DATABASE_ID: ${{ secrets.CLOUDFLARE_DATABASE_ID }}

      - name: Deploy admin to Cloudflare
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/admin
          secrets: |
            TURNSTILE_SECRET_KEY
            AUTH_SECRET
            AUTH_URL
            REVALIDATE_SECRET
          command: deploy --no-autoconfig
        env:
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
